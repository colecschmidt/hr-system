spring.application.name=hr-system

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/hr_system
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT — change secret before deploying anywhere
app.jwt.secret=change-me-to-a-long-random-secret-in-prod-at-least-256-bits
app.jwt.expiration-ms=86400000
